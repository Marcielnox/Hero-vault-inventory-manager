<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Vault Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <aside class="character-sidebar">
            <h2 style="font-size: 1.2rem; margin-bottom: 10px; text-align: center;">Characters</h2>
            <div id="tabs-list"></div>
            
            <div class="char-actions">
                <button type="button" class="util-btn" id="add-character-btn" title="Add New">➕ New</button>
                <button type="button" class="util-btn" id="rename-character-btn" title="Rename">✏️</button>
                <button type="button" class="danger-btn" id="delete-character-btn" title="Delete">🗑️</button>
            </div>
        </aside>

        <div class="container">
            <div class="utility-bar">
                <button type="button" class="util-btn clear-btn" id="clear-vault">
                    <span>🗑️</span> <span class="btn-text">Clear All</span>
                </button>
                <button type="button" class="util-btn" id="export-vault">
                    <span>📥</span> <span class="btn-text">Master Export</span>
                </button>
                <button type="button" class="util-btn" onclick="document.getElementById('import-vault').click()">
                    <span>📤</span> <span class="btn-text">Import</span>
                </button>
                <input type="file" id="import-vault" style="display: none;" accept=".json">
                <button type="button" class="util-btn" id="theme-toggle">
                    <span id="theme-icon">🌙</span>
                </button>
            </div>

            <h1>Hero Vault Tracker</h1>

            <form id="vault-form">
                <h2>Vault Entry</h2>
                <div class="form-row">
                    <label for="name">Item Name:</label>
                    <input type="text" id="name" list="item-suggestions" autocomplete="off" required>
                    <datalist id="item-suggestions"></datalist>
                </div>

                <div class="form-row">
                    <label for="rarity">Rarity:</label>
                    <select id="rarity">
                        <option value="Common">Common</option>
                        <option value="Uncommon">Uncommon</option>
                        <option value="Rare">Rare</option>
                        <option value="Very Rare">Very Rare</option>
                        <option value="Legendary">Legendary</option>
                        <option value="Artifact">Artifact</option>
                    </select>
                </div>

                <div class="form-row">
                    <label for="type">Item Type:</label>
                    <input type="text" id="type" placeholder="e.g. Weapon, Potion" required />
                </div>

                <div class="form-row">
                    <label for="value">Value (gp):</label>
                    <input type="number" id="value" min="0" inputmode="decimal" />
                </div>
                
                <div class="form-row">
                    <label for="quantity">Quantity:</label>
                    <input type="number" id="quantity" min="1" value="1" inputmode="numeric" />
                </div>
                
                <div class="form-row">
                    <span></span>
                    <button type="submit" id="add-item">Add Item</button>
                </div>
            </form>

            <hr style="border: 0; border-top: 1px solid rgba(255,215,0,0.3); margin-bottom: 30px;">

            <div class="filters-row">
                <div class="form-row">
                    <label for="filter">Filter Rarity:</label>
                    <select id="filter">
                        <option value="All">All Rarities</option>
                        <option value="Common">Common</option>
                        <option value="Uncommon">Uncommon</option>
                        <option value="Rare">Rare</option>
                        <option value="Very Rare">Very Rare</option>
                        <option value="Legendary">Legendary</option>
                        <option value="Artifact">Artifact</option>
                    </select>
                </div>

                <div class="form-row">
                    <label for="sort">Sort By:</label>
                    <select id="sort">
                        <option value="None">Newest First</option>
                        <option value="Rarity">Rarity (Highest)</option>
                        <option value="NameAsc">Name (A-Z)</option>
                        <option value="ValueDesc">Value (High-Low)</option>
                    </select>
                </div>

                <div class="form-row">
                    <label for="search">Search:</label>
                    <input type="text" id="search" placeholder="Type to search..." />
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Rarity</th>
                        <th>Type</th>
                        <th>Value</th>
                        <th>Qty</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="vault-table"></tbody>
                <tfoot>
                    <tr>
                        <td colspan="3" style="text-align: right; font-weight: bold;">Total Worth:</td>
                        <td id="total-value" colspan="2">0 gp</td>
                        <td></td>
                    </tr>
                </tfoot>
            </table>

            <footer class="vault-footer">
                <p>© 2026 Created by David "Marciel" Vega | Version 1.2.0</p>
            </footer>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
