<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hero Vault Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="utility-bar">
            <button type="button" class="util-btn clear-btn" id="clear-vault" title="Wipe all data">
                <span>🗑️</span> Clear All
            </button>
            <button type="button" class="util-btn" id="export-vault">
                <span>📥</span> Export
            </button>
            <button type="button" class="util-btn" onclick="document.getElementById('import-vault').click()">
                <span>📤</span> Import
            </button>
            <input type="file" id="import-vault" style="display: none;" accept=".json">
            <button type="button" class="util-btn" id="theme-toggle" title="Toggle Dark/Light Mode">
                <span id="theme-icon">🌙</span>
            </button>
        </div>

        <h1>Hero Vault Tracker</h1>

        <form id="vault-form">
            <h2>Vault Entry</h2>
            <div class="form-row">
                <label for="name">Item Name:</label>
                <input type="text" id="name" list="item-suggestions" autocomplete="off" required>
                <datalist id="item-suggestions"></datalist>
            </div>

            <div class="form-row">
                <label for="rarity">Rarity:</label>
                <select id="rarity">
                    <option value="Common">Common</option>
                    <option value="Uncommon">Uncommon</option>
                    <option value="Rare">Rare</option>
                    <option value="Very Rare">Very Rare</option>
                    <option value="Legendary">Legendary</option>
                    <option value="Artifact">Artifact</option>
                </select>
            </div>

            <div class="form-row">
                <label for="type">Item Type:</label>
                <input type="text" id="type" placeholder="e.g. Weapon, Potion" required />
            </div>

            <div class="form-row">
                <label for="value">Item Value (gp):</label>
                <input type="number" id="value" min="0" inputmode="decimal" />
            </div>
            
            <div class="form-row">
                <label for="quantity">Quantity:</label>
                <input type="number" id="quantity" min="1" value="1" inputmode="numeric" />
            </div>
            
            <div class="form-row">
                <span></span>
                <button type="submit" id="add-item">Add Item</button>
            </div>
        </form>

        <hr style="border: 0; border-top: 1px solid rgba(255,215,0,0.3); margin-bottom: 30px;">

        <div class="form-row">
            <label for="filter">Filter by Rarity:</label>
            <select id="filter">
                <option value="All">All Rarities</option>
                <option value="Common">Common</option>
                <option value="Uncommon">Uncommon</option>
                <option value="Rare">Rare</option>
                <option value="Very Rare">Very Rare</option>
                <option value="Legendary">Legendary</option>
                <option value="Artifact">Artifact</option>
            </select>
        </div>

        <div class="form-row">
            <label for="sort">Sort By:</label>
            <select id="sort">
                <option value="None">Newest First</option>
                <option value="Rarity">Rarity (Highest First)</option>
                <option value="NameAsc">Name (A-Z)</option>
                <option value="NameDesc">Name (Z-A)</option>
                <option value="ValueAsc">Value (Low to High)</option>
                <option value="ValueDesc">Value (High to Low)</option>
            </select>
        </div>

        <div class="form-row">
            <label for="search">Search Vault:</label>
            <input type="text" id="search" placeholder="Type to search..." />
        </div>

        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Rarity</th>
                    <th>Type</th>
                    <th>Value</th>
                    <th>Qty</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="vault-table"></tbody>
            <tfoot>
                <tr>
                    <td colspan="3" style="text-align: right; font-weight: bold;">Total Worth:</td>
                    <td id="total-value" colspan="2">0 gp</td>
                    <td></td>
                </tr>
            </tfoot>
        </table>

        <footer class="vault-footer">
            <p>© 2026 Created by David "Marciel" Vega | <span id="footer-date"></span></p>
            <p class="footer-note">Adventurer's Inventory Management System <span id="version-tag"></span></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
